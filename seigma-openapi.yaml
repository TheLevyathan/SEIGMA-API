paths:
  /auth/authenticate:
    post:
      tags:
        - Authentification
      summary: Obtenir un jeton JWT
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Jeton JWT valide 7 jours
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Non autorisé — jeton manquant ou expiré
      operationId: postAuthentification
  /activity/{activityId}:
    get:
      tags:
        - Activity
      summary: Récupérer une activité par son ID
      description: Retourne une activité spécifique à partir de son ActivityId (GUID).
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
        - name: activityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: GUID de l'activité
      responses:
        '200':
          description: Activité trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '401':
          description: Non authentifié
        '404':
          description: Activité introuvable
      operationId: getActivity
    put:
      tags:
        - Activity
      summary: Modifier une activité
      description: Met à jour une activité existante. Seuls les champs fournis sont modifiés.
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
        - name: activityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: GUID de l'activité à modifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityUpdateRequest'
      responses:
        '200':
          description: Activité modifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '400':
          description: Données invalides
        '401':
          description: Non authentifié
        '403':
          description: Accès refusé
        '404':
          description: Activité introuvable
      operationId: updateActivity
  /activity/getactivitiesfordate:
    post:
      tags:
        - Activity
      summary: Récupérer les activités d'un utilisateur pour une date
      description: 'Retourne la liste des activités planifiées pour un utilisateur à une date donnée.

        Le champ DateStart doit être au format ISO 8601 complet (ex: 2026-05-26T00:00:00).

        Le champ UserId doit être un objet {UserId, Display}, PAS une simple chaîne GUID.

        '
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivitiesForDateRequest'
      responses:
        '200':
          description: Liste des activités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivitiesForDateResponse'
        '400':
          description: Corps de requête malformé
        '401':
          description: Non authentifié
        '500':
          description: Erreur interne (souvent DateStart au mauvais format ou UserId en string simple)
      operationId: postActivity
  /timelogs:
    get:
      tags:
        - Timelog
      summary: Lister les poinçons
      description: Récupère la liste des poinçons filtrée par SalesOrderId et/ou UserId.
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
        - name: SalesOrderId
          in: query
          schema:
            type: string
            format: uuid
          description: GUID du bon de travail
        - name: UserId
          in: query
          schema:
            type: string
            format: uuid
          description: GUID de l'utilisateur
      responses:
        '200':
          description: Liste des poinçons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeLog'
        '401':
          description: Non authentifié
        '403':
          description: Accès refusé
      operationId: searchTimelog
    put:
      tags:
        - Timelog
      summary: Modifier un poinçon
      description: Met à jour un poinçon existant. Le TimeLogId est obligatoire dans le corps de la requête.
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeLogUpdateRequest'
      responses:
        '200':
          description: Poinçon modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeLogResponse'
        '400':
          description: Données invalides
        '401':
          description: Non authentifié
        '403':
          description: Accès refusé
      operationId: updateTimelog
  /timelogs/add:
    post:
      tags:
        - Timelog
      summary: Ajouter un poinçon
      description: Crée un nouveau poinçon. StartTime et UserId sont obligatoires.
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeLogCreateRequest'
      responses:
        '200':
          description: Poinçon créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeLogResponse'
        '400':
          description: Données invalides (StartTime ou UserId manquant/invalide)
        '401':
          description: Non authentifié
        '403':
          description: Accès refusé
      operationId: postTimelog
  /timelogs/{timelogId}:
    delete:
      tags:
        - Timelog
      summary: Supprimer un poinçon
      description: Supprime définitivement un poinçon. Retourne 204 No Content en cas de succès.
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
        - name: timelogId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: GUID du poinçon à supprimer
      responses:
        '204':
          description: Poinçon supprimé
        '401':
          description: Non authentifié
        '403':
          description: Droits insuffisants
        '404':
          description: Poinçon introuvable
      operationId: deleteTimelog
  /timelogs/start:
    get:
      tags:
        - Timelog
      summary: Démarrer un chronomètre
      description: 'Démarre un poinçon avec l''heure courante comme StartTime.

        Si un poinçon sans EndTime existe déjà pour cet utilisateur sur cette référence, le retourne sans en créer un nouveau.

        '
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
      responses:
        '200':
          description: Chronomètre démarré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeLogResponse'
        '401':
          description: Non authentifié
        '403':
          description: Accès refusé
      operationId: startTimelog
  /timelogs/{timelogId}/stop:
    get:
      tags:
        - Timelog
      summary: Arrêter un chronomètre
      description: Arrête un poinçon en cours en définissant EndTime à l'heure courante.
      parameters:
        - $ref: '#/components/parameters/seigmaCompany'
        - name: timelogId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: GUID du poinçon à arrêter
      responses:
        '200':
          description: Chronomètre arrêté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeLogResponse'
        '401':
          description: Non authentifié
        '404':
          description: Poinçon introuvable
      operationId: stopTimelog
  /reference/Action:
    post:
      tags:
        - Action
      summary: Créer une fiche Action
